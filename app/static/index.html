<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="theme-color" content="#1a1a2e">
    <meta name="description" content="Voice Diary — record and review voice notes">
    <title>Voice Diary</title>
    <link rel="manifest" href="/static/manifest.json">
    <link rel="icon" href="/static/icons/icon-192.png" type="image/png">
    <link rel="apple-touch-icon" href="/static/icons/icon-192.png">
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="/static/style.css">
</head>
<body class="bg-gray-950 text-gray-100 min-h-screen flex flex-col">

    <!-- Header / Nav -->
    <header class="bg-gray-900 border-b border-gray-800 px-4 py-3">
        <div class="flex items-center justify-between">
            <h1 class="text-lg font-semibold tracking-tight">🎙️ Voice Diary</h1>
            <nav class="flex gap-1">
                <button id="nav-today" class="nav-tab active text-sm px-3 py-1.5 rounded-lg transition" data-view="today">Today</button>
                <button id="nav-diary" class="nav-tab text-sm px-3 py-1.5 rounded-lg transition" data-view="diary">Diary</button>
            </nav>
        </div>
    </header>

    <!-- ============================================================= -->
    <!-- TODAY VIEW -->
    <!-- ============================================================= -->
    <main id="view-today" class="flex-1 flex flex-col px-4 pb-28">
        <!-- Date Navigation -->
        <div class="flex items-center justify-center gap-3 py-4">
            <button id="prev-day" class="p-2 rounded-lg bg-gray-800 hover:bg-gray-700 transition">
                <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 19l-7-7 7-7"/></svg>
            </button>
            <input id="date-picker" type="date" class="bg-gray-800 border border-gray-700 rounded-lg px-3 py-2 text-sm text-gray-200 focus:outline-none focus:ring-2 focus:ring-indigo-500">
            <button id="next-day" class="p-2 rounded-lg bg-gray-800 hover:bg-gray-700 transition">
                <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 5l7 7-7 7"/></svg>
            </button>
        </div>

        <!-- Timeline -->
        <div id="timeline" class="space-y-3 overflow-y-auto">
            <p id="empty-msg" class="text-center text-gray-500 mt-12">No recordings for this day.</p>
        </div>

        <!-- Diary Entry Section -->
        <div id="diary-section" class="hidden mt-6">
            <div class="flex items-center justify-between mb-3">
                <h2 class="text-sm font-semibold text-gray-300 uppercase tracking-wide">📖 Diary Entry</h2>
                <button id="compile-btn" class="hidden text-xs bg-indigo-600 hover:bg-indigo-500 text-white px-3 py-1.5 rounded-lg transition flex items-center gap-1.5">
                    <svg class="w-3.5 h-3.5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13 10V3L4 14h7v7l9-11h-7z"/></svg>
                    Compile
                </button>
                <button id="recompile-btn" class="hidden text-xs bg-amber-600 hover:bg-amber-500 text-white px-3 py-1.5 rounded-lg transition flex items-center gap-1.5">
                    <svg class="w-3.5 h-3.5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 4v5h.582m15.356 2A8.001 8.001 0 004.582 9m0 0H9m11 11v-5h-.581m0 0a8.003 8.003 0 01-15.357-2m15.357 2H15"/></svg>
                    Recompile
                </button>
            </div>
            <div id="compile-status" class="hidden flex items-center gap-2 text-sm text-indigo-400 mb-3">
                <div class="w-4 h-4 border-2 border-indigo-400 border-t-transparent rounded-full animate-spin"></div>
                <span>Compiling diary entry…</span>
            </div>
            <div id="diary-content" class="diary-entry-content bg-gray-900 border border-gray-800 rounded-xl p-4"></div>
        </div>
    </main>

    <!-- ============================================================= -->
    <!-- DIARY VIEW -->
    <!-- ============================================================= -->
    <main id="view-diary" class="hidden flex-1 flex flex-col px-4 pb-28">
        <div class="py-4">
            <h2 class="text-base font-semibold text-gray-200 mb-1">All Diary Entries</h2>
            <p class="text-xs text-gray-500">Your compiled voice diary, newest first.</p>
        </div>
        <div id="diary-list" class="space-y-3 overflow-y-auto flex-1">
            <p id="diary-empty-msg" class="text-center text-gray-500 mt-12">No diary entries yet.</p>
        </div>
        <div id="diary-load-more" class="hidden py-4 flex justify-center">
            <button id="load-more-btn" class="text-sm text-indigo-400 hover:text-indigo-300 transition">Load more…</button>
        </div>
    </main>

    <!-- Record Button (fixed bottom) -->
    <div id="record-fab" class="fixed bottom-0 left-0 right-0 flex justify-center pb-6 pt-3 bg-gradient-to-t from-gray-950 via-gray-950/90 to-transparent pointer-events-none">
        <button id="record-btn" class="pointer-events-auto w-20 h-20 rounded-full bg-red-600 hover:bg-red-500 active:scale-95 transition-all shadow-lg shadow-red-900/40 flex items-center justify-center focus:outline-none focus:ring-4 focus:ring-red-500/50">
            <svg id="mic-icon" class="w-8 h-8 text-white" fill="currentColor" viewBox="0 0 24 24"><path d="M12 14c1.66 0 3-1.34 3-3V5c0-1.66-1.34-3-3-3S9 3.34 9 5v6c0 1.66 1.34 3 3 3z"/><path d="M17 11c0 2.76-2.24 5-5 5s-5-2.24-5-5H5c0 3.53 2.61 6.43 6 6.92V21h2v-3.08c3.39-.49 6-3.39 6-6.92h-2z"/></svg>
            <div id="recording-pulse" class="hidden absolute w-20 h-20 rounded-full bg-red-500 animate-ping opacity-30"></div>
        </button>
    </div>

    <!-- Recording Timer -->
    <div id="recording-timer" class="hidden fixed bottom-28 left-1/2 -translate-x-1/2 bg-gray-800 rounded-full px-4 py-2 text-sm font-mono text-red-400 shadow-lg">
        <span id="timer-display">00:00</span>
    </div>

    <!-- API Key Modal -->
    <div id="api-key-modal" class="hidden fixed inset-0 bg-black/70 flex items-center justify-center z-50 p-4">
        <div class="bg-gray-900 rounded-2xl p-6 w-full max-w-sm border border-gray-800">
            <h2 class="text-lg font-semibold mb-2">Enter API Key</h2>
            <p class="text-sm text-gray-400 mb-4">Required to access Voice Diary.</p>
            <input id="api-key-input" type="password" placeholder="Your API key" class="w-full bg-gray-800 border border-gray-700 rounded-lg px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-indigo-500 mb-4">
            <button id="api-key-save" class="w-full bg-indigo-600 hover:bg-indigo-500 rounded-lg py-2 text-sm font-medium transition">Save</button>
        </div>
    </div>

    <script src="/static/app.js"></script>
</body>
</html>
