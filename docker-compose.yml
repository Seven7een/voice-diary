services:
  app:
    build: .
    container_name: voice_diary_app
    volumes:
      - audio_data:/data/audio
    environment:
      DATABASE_URL: postgresql+asyncpg://${DB_USER}:${DB_PASS}@db:5432/${DB_NAME}
      API_KEY: ${API_KEY}
      AWS_ACCESS_KEY_ID: ${AWS_ACCESS_KEY_ID}
      AWS_SECRET_ACCESS_KEY: ${AWS_SECRET_ACCESS_KEY}
      AWS_REGION: ${AWS_REGION:-us-east-1}
      BEDROCK_MODEL_ID: ${BEDROCK_MODEL_ID:-us.anthropic.claude-sonnet-4-20250514}
      TRANSCRIPTION_BACKEND: ${TRANSCRIPTION_BACKEND:-transcribe}
      WHISPER_MODEL: ${WHISPER_MODEL:-base}
      COMPILE_TIME: ${COMPILE_TIME:-03:00}
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "python3 -c \"import urllib.request; urllib.request.urlopen('http://localhost:8080/api/v1/health')\""]
      interval: 30s
      retries: 3
      start_period: 30s
      timeout: 10s
    command: uvicorn app.main:app --host 0.0.0.0 --port 8080
    depends_on:
      db:
        condition: service_healthy

  nginx-tls:
    image: nginx:1.27-alpine
    container_name: voice_diary_tls
    ports:
      - "${APP_PORT:-8444}:443"
    volumes:
      - ./nginx-tls.conf:/etc/nginx/conf.d/default.conf:ro
      - ${TLS_CERT_PATH}:/certs/cert.pem:ro
      - ${TLS_KEY_PATH}:/certs/key.pem:ro
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pgrep nginx > /dev/null"]
      interval: 30s
      retries: 3
      start_period: 10s
      timeout: 5s
    depends_on:
      app:
        condition: service_healthy

  db:
    image: postgres:17-alpine
    container_name: voice_diary_db
    volumes:
      - db_data:/var/lib/postgresql/data
    environment:
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASS}
      POSTGRES_DB: ${DB_NAME}
    restart: always
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER}"]
      interval: 10s
      retries: 5
      start_period: 30s
      timeout: 10s

volumes:
  db_data:
  audio_data:
